<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Codex Media</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
<main class="app-shell">
  <section class="control-panel">
    <header class="topbar">
      <div>
        <h1>Codex Media</h1>
        <p id="healthText">Checking service...</p>
      </div>
      <button id="refreshButton" type="button">Refresh</button>
    </header>

    <form id="workflowForm" class="workflow-form">
      <label class="field field-full">
        <span>Prompt</span>
        <textarea id="promptInput" rows="6" placeholder="A cinematic neon garden waking up frame by frame"></textarea>
      </label>

      <label class="field">
        <span>Provider</span>
        <select id="providerInput">
          <option value="comfyui">ComfyUI</option>
          <option value="openai">OpenAI</option>
        </select>
      </label>

      <label class="field">
        <span>Workflow</span>
        <select id="comfyWorkflowSelect"></select>
      </label>

      <label class="field">
        <span>Mode</span>
        <select id="modeInput">
          <option value="images">Image</option>
          <option value="video">Text video</option>
          <option value="image-video">Image video</option>
        </select>
      </label>

      <label class="field">
        <span>Size</span>
        <input id="sizeInput" type="text" list="sizeOptions" value="1024x1024">
        <datalist id="sizeOptions">
          <option value="720x1280">720x1280</option>
          <option value="1024x1792">1024x1792</option>
          <option value="1024x1024">1024x1024</option>
          <option value="1024x1536">1024x1536</option>
          <option value="1536x1024">1536x1024</option>
          <option value="1280x720">1280x720</option>
          <option value="1280x736">1280x736</option>
          <option value="768x1024">768x1024</option>
          <option value="1792x1024">1792x1024</option>
        </datalist>
      </label>

      <label class="field" id="qualityField">
        <span>Quality</span>
        <select id="qualityInput">
          <option value="medium">Medium</option>
          <option value="low">Low</option>
          <option value="high">High</option>
          <option value="auto">Auto</option>
        </select>
      </label>

      <label class="field" id="secondsField">
        <span>Seconds</span>
        <select id="secondsInput">
          <option value="4">4</option>
          <option value="8">8</option>
          <option value="12">12</option>
        </select>
      </label>

      <label class="field" id="fpsField">
        <span>FPS</span>
        <input id="videoFpsInput" type="number" min="1" max="60" value="24">
      </label>

      <label class="field" id="framesField">
        <span>Frames</span>
        <input id="videoFramesInput" type="number" min="1" max="300" value="73">
      </label>

      <label class="field">
        <span>Steps</span>
        <input id="stepsInput" type="number" min="1" max="150" value="20">
      </label>

      <label class="field field-full" id="initImageField">
        <span>Input image</span>
        <input id="initImageInput" type="file" accept="image/*">
      </label>

      <div class="actions">
        <button class="primary-button" type="submit">Start</button>
        <button id="stopButton" type="button" disabled>Stop</button>
      </div>
    </form>
  </section>

  <section class="preview-panel">
    <div class="section-head">
      <h2>Outputs</h2>
      <select id="jobSelect" aria-label="Jobs"></select>
    </div>
    <div class="status-line" id="jobStatus">No workflow selected.</div>
    <div class="media-grid" id="mediaGrid"></div>
    <div class="logs" id="logs"></div>
  </section>
</main>
<script src="/app.js" type="module"></script>
</body>
</html>
